<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LILLY OS v4.3 - EXTENDED EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@400;900&family=Cinzel:wght@700&display=swap');

        :root {
            --matrix-green: #00ff41;
            --cyber-blue: #00d4ff;
            --lilly-pink: #ff007f;
            --deep-black: #050508;
            --glass-bg: rgba(10, 10, 15, 0.85);
        }

        * { box-sizing: border-box; font-family: 'Fira Code', monospace; user-select: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--deep-black); overflow: hidden; color: var(--matrix-green); }

        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 2000; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; opacity: 0; transition: opacity 0.4s ease; }
        .active { display: flex !important; opacity: 1; }

        #boot-screen { padding: 40px; font-size: 14px; line-height: 1.6; background: black; color: var(--matrix-green); overflow-y: hidden; }
        .boot-line { margin-bottom: 4px; text-shadow: 0 0 5px var(--matrix-green); }

        #login-screen { justify-content: center; align-items: center; background: #000; }
        .login-card { border: 1px solid var(--cyber-blue); padding: 40px; border-radius: 15px; text-align: center; backdrop-filter: blur(10px); width: 320px; }
        input { background: transparent; border: none; border-bottom: 2px solid var(--cyber-blue); color: #fff; font-size: 20px; text-align: center; outline: none; width: 100%; margin-bottom: 20px; font-family: 'Orbitron'; }

        #desktop { background: #050508 url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1920') no-repeat center; background-size: cover; }
        .taskbar { position: absolute; bottom: 0; width: 100%; height: 45px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 15px; z-index: 100; }
        .desktop-icons { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .icon { width: 80px; text-align: center; color: #fff; cursor: pointer; font-size: 10px; transition: 0.2s; }
        .icon img { width: 45px; display: block; margin: 0 auto 5px; }

        .window { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: none; flex-direction: column; z-index: 500; }
        .win-header { padding: 10px 15px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-size: 12px; color: #fff; }
        .win-content { padding: 25px; text-align: center; color: #fff; }

        .btn { background: transparent; border: 1px solid var(--cyber-blue); color: var(--cyber-blue); padding: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-family: 'Orbitron'; transition: 0.3s; }
        .btn:hover { background: var(--cyber-blue); color: #000; box-shadow: 0 0 15px var(--cyber-blue); }
        .btn-pink { border-color: var(--lilly-pink); color: var(--lilly-pink); }
        .btn-pink:hover { background: var(--lilly-pink); color: #fff; box-shadow: 0 0 15px var(--lilly-pink); }
        .btn-reset { font-size: 10px; padding: 5px; margin-top: 20px; border-style: dashed; opacity: 0.7; }

        #result-screen { z-index: 2000; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        canvas { margin: 10px auto; display: block; border-radius: 50%; border: 4px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="boot-screen" class="screen active"></div>

    <div id="login-screen" class="screen">
        <div class="login-card">
            <h2 style="color:var(--cyber-blue); font-family:'Orbitron'">LILLY OS</h2>
            <input type="password" id="pass" placeholder="PASSWORD">
            <button class="btn" onclick="checkPass()">LOGIN</button>
        </div>
    </div>

    <div id="intercept-screen" class="screen" style="justify-content:center; align-items:center; background:#000; text-align:center;">
        <div style="font-size:50px; color:var(--lilly-pink); margin-bottom:20px;">❤️</div>
        <div id="romance-msg" style="font-family:'Cinzel'; color:#fff; font-size:22px; padding:20px;"></div>
    </div>

    <div id="desktop" class="screen">
        <div class="desktop-icons">
            <div class="icon" onclick="openGame()"><img src="https://cdn-icons-png.flaticon.com/512/3039/3039430.png">TRUTH OR DARE</div>
            <div class="icon" onclick="openVault()"><img src="https://cdn-icons-png.flaticon.com/512/2961/2961157.png">VAULT</div>
        </div>
        <div class="taskbar">
            <span id="clock" style="color:#fff; font-weight:bold; margin-left:auto;"></span>
        </div>

        <div id="game-window" class="window">
            <div class="win-header"><span>TRUTH_OR_DARE.exe</span><span onclick="closeGame()" style="cursor:pointer">X</span></div>
            <div class="win-content" id="setup-view">
                <p>Number of Players:</p>
                <input type="number" id="p-count" value="2" min="2" max="10" style="width:80px">
                <button class="btn" onclick="generateInputs()">NEXT</button>
            </div>
            <div class="win-content" id="names-view" style="display:none">
                <div id="inputs-container"></div>
                <button class="btn" onclick="initGame()">START ENGINE</button>
                <button class="btn btn-reset" onclick="resetToSetup()">RECONFIGURE PLAYERS</button>
            </div>
            <div class="win-content" id="wheel-view" style="display:none">
                <canvas id="wheel" width="250" height="250"></canvas>
                <button class="btn btn-pink" id="spin-btn" onclick="spin()">SPIN</button>
                <button class="btn btn-reset" onclick="resetToSetup()">SYSTEM RESET</button>
            </div>
        </div>

        <div id="vault-window" class="window">
            <div class="win-header"><span>ENCRYPTED_VAULT</span><span onclick="closeVault()" style="cursor:pointer">X</span></div>
            <div class="win-content">
                <h2 style="color:var(--lilly-pink)">Private Access Only</h2>
                <p>Memories are being synced... ❤️</p>
                <button class="btn btn-pink" onclick="closeVault()">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div style="padding:30px; text-align:center; border:1px solid var(--lilly-pink); border-radius:15px; max-width:350px; background: rgba(0,0,0,0.9);">
            <h1 id="winner-name" style="font-family:'Orbitron'; margin:0 0 15px 0;"></h1>
            <div id="choice-buttons" style="display:none; gap:10px; margin-bottom:20px; justify-content:center;">
                <button class="btn" onclick="pickTruth()" style="margin-top:0;">TRUTH</button>
                <button class="btn btn-pink" onclick="pickDare()" style="margin-top:0;">DARE</button>
            </div>
            <p id="question-text" style="color:#fff; font-size:18px; line-height:1.4;"></p>
            <button id="next-btn" class="btn btn-pink" onclick="backToWheel()" style="display:none;">NEXT ROUND</button>
        </div>
    </div>

<script>
    const passKey = "kiba2006";
    const bootLines = ["> CORE LOADED.", "> BIOMETRIC CHECK...", "> LILLY_V4.3 DETECTED.", "> hacked by KIBA.", "> SECURITY BYPASSED.", "> AWAITING KEY..."];
    
    const allTruths = [
        "What is your biggest secret?","Most embarrassing memory?","Who was your first crush?","Last lie you told?","If you could be invisible, what would you do?",
        "What is the most childish thing you still do?","Have you ever lied to get out of a date?","What is your worst habit?","Ever stalked someone on Instagram?",
        "What is the silliest fear you have?","Most embarrassing song in your playlist?","Have you ever cried during a movie?","What’s your cringiest memory?",
        "If you were a ghost, who would you haunt?","Who is the most annoying person you know?","Have you ever pretended to be on the phone?","Worst date story?",
        "What is the most expensive thing you've broken?","Have you ever cheated in a board game?","What's the last thing you searched on Google?"
    ];

    const allDares = [
        "Do 20 pushups.","Sing a song out loud.","Do your best dance move.","Call someone and say hi.","Let someone text a friend from your phone.",
        "Talk in an accent for the next 3 rounds.","Try to touch your nose with your tongue.","Post a silly selfie on your story.","Give a 1-minute speech on why Lilly is amazing.",
        "Do 10 jumping jacks.","Act like a cat for 1 minute.","Let the person to your right draw on your face.","Try to juggle 3 items of the group's choice.",
        "Whisper a secret to the person next to you.","Drink a glass of water in 10 seconds.","Do an impression of someone in the room."
    ];

    const allLillyFavors = [
        "Lilly, you are perfect. ✨","Kiba loves you more than code. ❤️","You win everything automatically! 💋","Lilly, your smile is the most beautiful thing in the world. ✨",
        "Every code in this OS exists to make you happy. 💖","Lilly, you are Kiba's greatest inspiration. 💋","Your kindness is a superpower. ❤️",
        "Lilly, you are the true Queen of this kingdom. 👑","The developer loves you more than words can express. ❤️","Error: Pure perfection detected. Lilly wins! 🥇"
    ];

    let activeTruths = [...allTruths], activeDares = [...allDares], activeLillyFavors = [...allLillyFavors];
    let pNames = [], angle = 0, bIdx = 0;

    function runBoot() {
        const bs = document.getElementById('boot-screen');
        if(bIdx < bootLines.length) {
            const div = document.createElement('div');
            div.className = 'boot-line';
            div.innerText = bootLines[bIdx];
            bs.appendChild(div);
            bIdx++;
            setTimeout(runBoot, 150);
        } else {
            setTimeout(() => {
                bs.classList.remove('active');
                document.getElementById('login-screen').classList.add('active');
            }, 500);
        }
    }

    function checkPass() {
        if(document.getElementById('pass').value === passKey) {
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('romance-msg').innerText = "Access Granted. I Love You, Lilly. ❤️";
            document.getElementById('intercept-screen').classList.add('active');
            setTimeout(() => {
                document.getElementById('intercept-screen').classList.remove('active');
                document.getElementById('desktop').classList.add('active');
                updateClock();
            }, 2000);
        } else { alert("ACCESS DENIED"); }
    }

    function updateClock() {
        const n = new Date();
        document.getElementById('clock').innerText = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
        setTimeout(updateClock, 1000);
    }

    function openGame() { document.getElementById('game-window').style.display = 'flex'; }
    function closeGame() { document.getElementById('game-window').style.display = 'none'; }
    function openVault() { document.getElementById('vault-window').style.display = 'flex'; }
    function closeVault() { document.getElementById('vault-window').style.display = 'none'; }

    function generateInputs() {
        const c = document.getElementById('p-count').value;
        const cont = document.getElementById('inputs-container');
        cont.innerHTML = "";
        for(let i=0; i<c; i++) cont.innerHTML += `<input type="text" class="p-in" placeholder="Target Name ${i+1}" style="margin:5px 0; font-size:14px; border-bottom:1px solid var(--cyber-blue)">`;
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('names-view').style.display = 'block';
    }

    function resetToSetup() {
        document.getElementById('wheel-view').style.display = 'none';
        document.getElementById('names-view').style.display = 'none';
        document.getElementById('setup-view').style.display = 'block';
        pNames = [];
    }

    function initGame() {
        pNames = Array.from(document.querySelectorAll('.p-in')).map(i => i.value.trim()).filter(v => v !== "");
        if(pNames.length < 2) return alert("System requires 2+ targets!");
        document.getElementById('names-view').style.display = 'none';
        document.getElementById('wheel-view').style.display = 'block';
        renderWheel();
    }

    const can = document.getElementById('wheel'), ctx = can.getContext('2d');
    function renderWheel() {
        const arc = (Math.PI * 2) / pNames.length;
        ctx.clearRect(0,0,250,250);
        pNames.forEach((n, i) => {
            ctx.fillStyle = i % 2 === 0 ? "#00d4ff" : "#050508";
            ctx.beginPath(); ctx.moveTo(125,125); ctx.arc(125,125,120, angle + i*arc, angle + (i+1)*arc); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.save(); ctx.translate(125,125); ctx.rotate(angle + i*arc + arc/2);
            ctx.font = "bold 12px Orbitron";
            ctx.fillText(n, 50, 5); ctx.restore();
        });
    }

    function spin() {
        let speed = Math.random() * 0.4 + 0.3;
        let t = setInterval(() => {
            angle += speed; speed *= 0.98;
            renderWheel();
            if(speed < 0.002) { clearInterval(t); finish(); }
        }, 20);
    }

    function finish() {
        const arc = (Math.PI * 2) / pNames.length;
        const index = Math.floor(pNames.length - (angle % (Math.PI * 2) / arc)) % pNames.length;
        const winner = pNames[index];
        const winEl = document.getElementById('winner-name');
        winEl.innerText = winner;
        document.getElementById('question-text').innerText = "";
        
        if(winner.toLowerCase().trim() === "lilly") {
            document.getElementById('choice-buttons').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            const r = Math.floor(Math.random()*allLillyFavors.length);
            document.getElementById('question-text').innerText = allLillyFavors[r];
            winEl.style.color = "var(--lilly-pink)";
        } else {
            winEl.style.color = "#fff";
            document.getElementById('choice-buttons').style.display = 'flex';
            document.getElementById('next-btn').style.display = 'none';
        }
        document.getElementById('result-screen').classList.add('active');
    }

    function pickTruth() {
        document.getElementById('choice-buttons').style.display = 'none';
        const r = Math.floor(Math.random()*allTruths.length);
        document.getElementById('question-text').innerText = "TRUTH: " + allTruths[r];
        document.getElementById('next-btn').style.display = 'block';
    }

    function pickDare() {
        document.getElementById('choice-buttons').style.display = 'none';
        const r = Math.floor(Math.random()*allDares.length);
        document.getElementById('question-text').innerText = "DARE: " + allDares[r];
        document.getElementById('next-btn').style.display = 'block';
    }

    function backToWheel() { document.getElementById('result-screen').classList.remove('active'); }

    runBoot();
</script>
</body>
</html>
